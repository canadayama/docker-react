version: "3.4"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: docker-react-app
    command: sh -c "npm start"
    stdin_open: true
    tty: true
    volumes:
      - ./src:/app
      - node_modules:/app/node_modules
    ports:
      - 3000:3000
    networks:
      - network

volumes:
  node_modules:

networks:
  network: